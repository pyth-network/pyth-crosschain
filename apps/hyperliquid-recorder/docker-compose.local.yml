services:
  clickhouse-local:
    image: clickhouse/clickhouse-server:24.12
    container_name: hyperliquid-recorder-clickhouse-local
    environment:
      CLICKHOUSE_USER: recorder
      CLICKHOUSE_PASSWORD: recorder
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-local-data:/var/lib/clickhouse
      - ./sql/init-local.sql:/docker-entrypoint-initdb.d/init-local.sql:ro

  hyperliquid-recorder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyperliquid-recorder
    env_file:
      - .env.local
    environment:
      USE_LOCAL_CLICKHOUSE: "true"
      CLICKHOUSE_LOCAL_URL: "http://clickhouse-local:8123"
      CLICKHOUSE_LOCAL_USER: "recorder"
      CLICKHOUSE_LOCAL_PASSWORD: "recorder"
      CLICKHOUSE_DATABASE: "pyth_analytics"
      CLICKHOUSE_TABLE: "hyperliquid_l2_snapshots"
      METRICS_PORT: "9091"
      HEALTH_PORT: "8080"
    depends_on:
      - clickhouse-local
    ports:
      - "9091:9091"
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest
    container_name: hyperliquid-recorder-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.sample.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.sample.yml:/etc/prometheus/alerts.sample.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - hyperliquid-recorder

volumes:
  clickhouse-local-data:
