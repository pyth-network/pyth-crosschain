# Pyth price-pusher config (HyperEVM / chain 999)
#
# Cost note: each on-chain feed update costs a fixed Pyth fee
# (singleUpdateFeeInWei = 0.0003 HYPE). The only way to reduce spend is to
# write each feed fewer times. Every feed below carries an `early_update`
# block set EQUAL to its main thresholds: this opts the feed OUT of the
# default "batch everything on any push" behaviour, so it is written ONLY
# when it is independently due (its own heartbeat or deviation). Without
# `early_update`, a single volatile feed crossing its threshold drags all
# other feeds into the (per-feed-charged) batch.
#
# Tiers:
#   volatile  -> 1%   deviation, 1800s (30m) heartbeat
#   stable    -> 0.5% deviation, 3600s (60m) heartbeat
#   redemption-> 0.5% deviation, 3600s (60m) heartbeat
# confidence_ratio is left at 100 (effectively disabled) on every feed.

# ----------------------------------------------------------------------------
# Volatile assets (1% / 30m)
# ----------------------------------------------------------------------------
  - alias: HYPE/USD
    id: 4279e31cc369bbcc2faf022b382b080e32a8e689ff20fbc530d2a603eb6cd98b
    time_difference: 1800
    price_deviation: 1
    confidence_ratio: 100
    early_update:
      time_difference: 1800
      price_deviation: 1
