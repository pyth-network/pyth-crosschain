# Markets to subscribe on the single combined bookTicker connection. Stored
# upper-cased; subscribed lower-cased. Seeded with the tokenized
# equity/commodity USDⓈ-M perpetuals on Binance futures.
#
# NOTE: Binance accepts a subscribe for a symbol that isn't listed but never
# sends data for it, so it shows up as perpetual staleness in /ready rather than
# an error. Verify each symbol is actually listed on Binance USDⓈ-M futures.
markets:
  - "XAUUSDT"
  - "XAGUSDT"
  - "CLUSDT"
  - "BZUSDT"
  - "CRCLUSDT"
  - "MSTRUSDT"
  - "NVDAUSDT"
  - "TSLAUSDT"
  - "SPCXUSDT"

clickhouse:
  url: "http://clickhouse-local:8123"
  user: "recorder"
  password: "recorder"
  database: "default"
  table: "binance_book_ticker"

metrics_port: 9094
health_port: 8084
ready_stale_seconds: 10
queue_max_rows: 50000
batch_max_rows: 10000
batch_flush_seconds: 2.0
reconnect_max_backoff_seconds: 5
insert_async: true
