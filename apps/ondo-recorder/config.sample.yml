clickhouse:
  url: "http://clickhouse-local:8123"
  user: "recorder"
  password: "recorder"
  database: "pyth_analytics"
  table: "ondo_quotes"

poll_interval_seconds: 1.0
metrics_port: 9093
health_port: 8083
ready_stale_seconds: 10
queue_max_rows: 50000
batch_max_rows: 10000
batch_flush_seconds: 2.0
retention_days: 90
insert_async: true
