global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.sample.yml

scrape_configs:
  - job_name: "ondo_recorder"
    scrape_interval: 15s
    static_configs:
      - targets: ["ondo-recorder:9093"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "ondo_recorder"
