name: Test Solana Contract

on:
  pull_request:
    paths:
      - .github/workflows/ci-solana-contract.yml
      - target_chains/solana/**
      - pythnet/pythnet_sdk/**
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            features: ""
          - name: lazer
            features: "--features lazer"
    name: (${{ matrix.name }})
    defaults:
      run:
        working-directory: target_chains/solana
    steps:
      - uses: actions/checkout@v2
        with:
          cache-workspaces: "target_chains/solana -> target"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.2.20/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Format check
        run: cargo fmt --all -- --check
        if: success() || failure()
      - name: Clippy check
        run: cargo clippy --all-targets --all-features -- --deny warnings
        if: success() || failure()
      - name: Build
        run: cargo-build-sbf ${{ matrix.features }}
        if: success() || failure()
      - name: Run tests
        run: cargo-test-sbf ${{ matrix.features }}
        if: success() || failure()
      - name: Run sdk tests
        run: cargo test --package pyth-solana-receiver-sdk ${{ matrix.features }}
        if: success() || failure()
