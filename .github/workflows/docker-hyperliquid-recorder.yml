name: Build and Push Hyperliquid Recorder Image
on:
  push:
    tags:
      - hyperliquid-recorder-v*
  pull_request:
    paths:
      - "apps/hyperliquid-recorder/**"
      - ".github/workflows/docker-hyperliquid-recorder.yml"
  workflow_dispatch:
    inputs:
      dispatch_description:
        description: "Dispatch description"
        required: true
        type: string
permissions:
  contents: read
  id-token: write
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pyth-network/hyperliquid-recorder
jobs:
  hyperliquid-recorder-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set image tag to version of the git tag
        if: ${{ startsWith(github.ref, 'refs/tags/hyperliquid-recorder-v') }}
        run: |
          PREFIX="refs/tags/hyperliquid-recorder-"
          VERSION="${GITHUB_REF:${#PREFIX}}"
          echo "IMAGE_TAG=${VERSION}" >> "${GITHUB_ENV}"
      - name: Set image tag to the git commit hash
        if: ${{ !startsWith(github.ref, 'refs/tags/hyperliquid-recorder-v') }}
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "IMAGE_TAG=sha-${SHORT_SHA}" >> "${GITHUB_ENV}"
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: metadata_hyperliquid_recorder
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
      - name: Build and push docker image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          file: "./apps/hyperliquid-recorder/Dockerfile"
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata_hyperliquid_recorder.outputs.tags }}
          labels: ${{ steps.metadata_hyperliquid_recorder.outputs.labels }}
