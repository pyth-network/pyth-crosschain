[package]
name        = "pyth-wormhole-near"
version     = "0.1.0"
authors     = ["Pyth Data Association"]
edition     = "2021"
description  = "Pyth-owned Wormhole core bridge for NEAR (vendored from wormhole-foundation/wormhole)"
repository  = "https://github.com/pyth-network/pyth-crosschain"

[lib]
name       = "pyth_wormhole"
crate-type = ["cdylib", "lib"]

[dependencies]
hex      = { version = "0.4.3" }
near-sdk = { version = "5.5.0", features = ["legacy", "unstable"] }

[dev-dependencies]
near-sdk = { version = "5.5.0", features = ["legacy", "unstable", "unit-testing"] }

[profile.release]
codegen-units   = 1
opt-level       = 3
lto             = "fat"
debug           = false
panic           = "abort"
overflow-checks = true

[package.metadata.near.reproducible_build]
image                   = "sourcescan/cargo-near:0.13.3-rust-1.84.1"
image_digest            = "sha256:baa712c5d2b7522d38175e36330d336ad2c4ce32bfaaa41af94ce40407ecd803"
passed_env              = []
# --no-abi: this bridge calls `env::ecrecover`, which near-sdk gates behind the `unstable` feature.
# With `unstable` enabled, cargo-near's ABI extraction (which dlopens a host-target dylib) fails to
# resolve `promise_batch_action_function_call_weight`. The bridge needs no ABI metadata, so skip it.
container_build_command = ["cargo", "near", "build", "non-reproducible-wasm", "--locked", "--no-abi"]
