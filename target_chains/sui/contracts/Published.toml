# Published addresses for the Pyth package, keyed by environment.
#
# Under the Move 2024 package system (Sui package management v2) the per-network
# `Move.<net>.toml` deploy templates are superseded by this file: the single
# `Move.toml` is built per network with `sui move build -e <mainnet|testnet>`,
# which reads the package's published address from here and pins dependencies
# from `Move.lock`. The `mainnet`/`testnet` environments are implicit and need
# no `[environments]` entry in `Move.toml`.
#
# All values are verified against on-chain state via the public Sui fullnodes
# (`sui_getObject` on the Pyth `State` object's wrapped `0x2::package::UpgradeCap`).

