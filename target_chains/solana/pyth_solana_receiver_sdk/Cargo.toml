[package]
name = "pyth-solana-receiver-sdk"
version = "1.2.1"
description = "SDK for the Pyth Solana Receiver program"
authors = ["Pyth Data Association"]
repository = "https://github.com/pyth-network/pyth-crosschain"
license = "Apache-2.0"
edition = "2021"

[lib]
crate-type = ["lib"]
name = "pyth_solana_receiver_sdk"

[features]
idl-build = ["anchor-lang/idl-build", "pythnet-sdk/idl-build"]
pro-compatible = []

[dependencies]
anchor-lang = "1.0.2"
cfg-if = { workspace = true }
hex = { workspace = true }
pythnet-sdk = { workspace = true, features = ["solana-program"]}
borsh = "1.6.1"

[dev-dependencies]
solana-borsh = "3.0.2"
